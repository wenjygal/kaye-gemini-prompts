<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מאפיינים רעיון בעזרת ראיון עם Gemini — מכללת קיי</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Poppins:wght@400;600;700&display=swap');

:root {
  --color-magenta: #E0128B;
  --color-orange: #F68920;
  --color-bg: #F5F5F7;
  --color-dark: #1A1A1A;
  --color-white: #FFFFFF;
  --color-magenta-10: rgba(224,18,139,0.10);
  --fg-secondary: rgba(26,26,26,0.60);
  --gradient-brand: linear-gradient(135deg, #E0128B 0%, #F68920 100%);
  --gradient-brand-90: linear-gradient(90deg, #E0128B 0%, #F68920 100%);
  --radius-md: 12px;
  --radius-lg: 20px;
  --radius-pill: 999px;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-hover: 0 10px 32px rgba(224,18,139,0.16);
  --font-body: 'Rubik', sans-serif;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  min-height: 100%;
  background: var(--color-bg);
  font-family: var(--font-body);
  color: var(--color-dark);
}

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  max-width: 640px;
  margin: 0 auto;
  padding: 6vh 24px;
  text-align: center;
}

.label {
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-magenta);
  margin-bottom: 1rem;
}

h1 {
  font-size: clamp(1.7rem, 4.5vw, 2.5rem);
  font-weight: 700;
  line-height: 1.25;
  margin: 0 0 0.75rem 0;
}

.sub {
  font-size: 1.05rem;
  color: var(--fg-secondary);
  line-height: 1.6;
  margin: 0 0 3rem 0;
  max-width: 460px;
}

.gateway {
  display: flex;
  flex-direction: column;
  gap: 1.1rem;
  width: 100%;
}

.gate-link {
  display: flex;
  align-items: center;
  gap: 1.1rem;
  background: var(--color-white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: 1.4rem 1.6rem;
  text-decoration: none;
  color: var(--color-dark);
  text-align: right;
  transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
}
.gate-link:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
.gate-link:active { transform: scale(0.98); }

.gate-link.primary {
  background: var(--gradient-brand);
  color: white;
}

.gate-icon {
  flex: none;
  width: 52px; height: 52px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--color-magenta-10);
}
.gate-link.primary .gate-icon {
  background: rgba(255,255,255,0.18);
}
.gate-icon svg { width: 26px; height: 26px; }

.gate-text { flex: 1; min-width: 0; }
.gate-text .gate-title {
  font-size: 1.15rem;
  font-weight: 700;
  margin-bottom: 0.2rem;
}
.gate-text .gate-desc {
  font-size: 0.88rem;
  opacity: 0.75;
  line-height: 1.4;
}

.gate-arrow {
  flex: none;
  font-size: 1.3rem;
  opacity: 0.5;
}

footer {
  margin-top: 3rem;
  font-size: 0.82rem;
  color: var(--fg-secondary);
}
</style>
</head>
<body>

<div class="page">
  <span class="label">האקתון AI בהוראה · מכללת קיי · 20.7</span>
  <h1>מאפיינים רעיון בעזרת ראיון עם Gemini</h1>
  <p class="sub">כל מה שצריך למפגש — המצגת ו-7 הפרומפטים לראיון עם Gemini.</p>

  <div class="gateway">
    <a class="gate-link primary" href="slides/">
      <span class="gate-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </span>
      <span class="gate-text">
        <div class="gate-title">המצגת</div>
        <div class="gate-desc">15 שקופיות — תיאוריה, עבודה קבוצתית ו-Reverse Engineering</div>
      </span>
      <span class="gate-arrow">‹</span>
    </a>

    <a class="gate-link" href="prompts/">
      <span class="gate-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#E0128B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </span>
      <span class="gate-text">
        <div class="gate-title">7 הפרומפטים</div>
        <div class="gate-desc">להעתקה ולשימוש בשיחה עם Gemini במהלך העבודה הקבוצתית</div>
      </span>
      <span class="gate-arrow">‹</span>
    </a>
  </div>

  <footer>מכללת קיי · Boost Me</footer>
</div>

</body>
</html>
