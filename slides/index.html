<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>המצגת — מכללת קיי</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap');

:root {
  --color-magenta: #E0128B;
  --color-orange: #F68920;
  --color-dark: #1A1A1A;
  --gradient-brand: linear-gradient(135deg, #E0128B 0%, #F68920 100%);
  --radius-pill: 999px;
  --shadow-elevated: 0 8px 28px rgba(0,0,0,0.18);
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: var(--color-dark);
  font-family: 'Rubik', sans-serif;
  overflow: hidden;
}

.topbar {
  position: fixed;
  top: 0; right: 0; left: 0;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  background: rgba(26,26,26,0.92);
  backdrop-filter: blur(8px);
  z-index: 10;
}

.back-link {
  display: flex;
  align-items: center;
  gap: 8px;
  color: white;
  text-decoration: none;
  font-size: 0.95rem;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: var(--radius-pill);
  background: rgba(255,255,255,0.1);
  transition: background 0.2s;
}
.back-link:hover { background: rgba(255,255,255,0.18); }
.back-link:focus-visible, .open-link:focus-visible {
  outline: 3px solid white;
  outline-offset: 2px;
}

.title {
  color: rgba(255,255,255,0.7);
  font-size: 0.85rem;
  font-weight: 500;
}

.open-link {
  color: white;
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 700;
  background: var(--gradient-brand);
  border-radius: var(--radius-pill);
  padding: 8px 18px;
  white-space: nowrap;
}

.canva-wrap {
  position: absolute;
  top: 56px; left: 0; right: 0; bottom: 0;
}
.canva-wrap iframe {
  width: 100%; height: 100%;
  border: none;
}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-link" href="../">
    <span>›</span>
    <span>לעמוד הראשי</span>
  </a>
  <span class="title">מאפיינים רעיון בעזרת ראיון עם Gemini</span>
  <a class="open-link" href="https://brr7.short.gy/designing-product-with-ai" target="_blank" rel="noopener">פתח בקנווה</a>
</div>

<div class="canva-wrap">
  <iframe
    loading="lazy"
    src="https://www.canva.com/design/DAHP3HENkgc/hUeQBAcsDqA54RFh5QmYJQ/view?embed"
    allow="fullscreen"
    allowfullscreen="true"
    title="מצגת — מאפיינים רעיון בעזרת ראיון עם Gemini">
  </iframe>
</div>

</body>
</html>
